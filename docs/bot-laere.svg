<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" font-family="Segoe UI, sans-serif">
  <!-- LÆREBOT & HVA-ER-DET? — the learning duo -->
  <rect width="200" height="200" rx="16" fill="#F4EDE3"/>
  <rect x="0" y="162" width="200" height="38" fill="#C9B393"/>
  <rect x="0" y="162" width="200" height="6" fill="#B39D7D"/>

  <!-- LÆREBOT: block bot holding a flash card -->
  <g transform="translate(22,58)">
    <rect x="0" y="0" width="62" height="74" rx="9" fill="#8B5E3C" stroke="#6E4629" stroke-width="3"/>
    <!-- washer eyes, green streak glow -->
    <circle cx="20" cy="24" r="11" fill="#D7DBDE" stroke="#8F979E" stroke-width="2.5"/>
    <circle cx="20" cy="24" r="5" fill="#3E9B5F"/>
    <circle cx="44" cy="24" r="9" fill="#D7DBDE" stroke="#8F979E" stroke-width="2.5"/>
    <circle cx="44" cy="24" r="4" fill="#3E9B5F"/>
    <!-- happy slot mouth -->
    <path d="M16 50 q15 12 32 2" stroke="#54371F" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- graduation cap -->
    <path d="M-4 -4 L31 -18 L66 -4 L31 8 Z" fill="#1B222B"/>
    <rect x="26" y="-8" width="10" height="8" fill="#1B222B"/>
    <line x1="60" y1="-2" x2="60" y2="14" stroke="#E2B93B" stroke-width="2.5"/>
    <circle cx="60" cy="17" r="3.5" fill="#E2B93B"/>
    <!-- spring legs -->
    <g stroke="#9AA3AB" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M18 74 q-9 5 0 10 q9 5 0 10 q-9 5 0 10"/>
      <path d="M46 74 q-9 5 0 10 q9 5 0 10 q-9 5 0 10"/>
    </g>
    <!-- arm holding flash card -->
    <line x1="62" y1="40" x2="86" y2="46" stroke="#9AA3AB" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- flash card -->
  <g transform="translate(104,84) rotate(6)">
    <rect x="0" y="0" width="52" height="36" rx="5" fill="#FBF9F4" stroke="#C9B393" stroke-width="2.5"/>
    <text x="26" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#2B2B2B">7×8?</text>
  </g>

  <!-- HVA-ER-DET?: small camera-eye bot looking at a beetle -->
  <g transform="translate(136,110)">
    <rect x="0" y="0" width="44" height="52" rx="8" fill="#B08968" stroke="#8B6547" stroke-width="2.5"/>
    <!-- single big camera eye -->
    <circle cx="22" cy="20" r="13" fill="#1B222B" stroke="#0E1620" stroke-width="2"/>
    <circle cx="22" cy="20" r="6" fill="#2E4A6B"/>
    <circle cx="19" cy="17" r="2.2" fill="#F4EDE3"/>
    <!-- nose button -->
    <circle cx="22" cy="40" r="5.5" fill="#E2B93B" stroke="#C9A227" stroke-width="2"/>
    <!-- question sparks -->
    <text x="50" y="6" font-size="17" font-weight="700" fill="#2E4A6B">?</text>
  </g>
  <!-- beetle it studies -->
  <g transform="translate(112,168)">
    <ellipse cx="0" cy="0" rx="9" ry="6.5" fill="#2E4A6B"/>
    <circle cx="-9" cy="-1" r="3.5" fill="#1B222B"/>
    <line x1="-11" y1="-4" x2="-15" y2="-8" stroke="#1B222B" stroke-width="1.6"/>
    <line x1="-8" y1="-4" x2="-9" y2="-9" stroke="#1B222B" stroke-width="1.6"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#16233A" stroke-width="1.4"/>
  </g>

  <text x="100" y="190" text-anchor="middle" font-size="12" fill="#8A7A63" letter-spacing="2">THE LEARNING DUO</text>
</svg>
