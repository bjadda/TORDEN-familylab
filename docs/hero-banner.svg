<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 230" font-family="Segoe UI, sans-serif">
  <!-- TORDEN hero — stormy sky, lightning, and the robot family on the workbench -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16233A"/>
      <stop offset="1" stop-color="#243B57"/>
    </linearGradient>
  </defs>
  <rect width="900" height="230" rx="14" fill="url(#sky)"/>

  <!-- clouds -->
  <g fill="#31486B" opacity=".8">
    <ellipse cx="130" cy="38" rx="90" ry="22"/>
    <ellipse cx="215" cy="52" rx="60" ry="16"/>
    <ellipse cx="760" cy="34" rx="100" ry="20"/>
    <ellipse cx="670" cy="48" rx="55" ry="14"/>
  </g>

  <!-- lightning bolt -->
  <path d="M452 18 L410 92 L444 92 L402 168 L500 78 L458 78 L496 18 Z"
        fill="#E2B93B" stroke="#C9A227" stroke-width="3" stroke-linejoin="round"/>

  <!-- wordmark -->
  <text x="450" y="122" text-anchor="middle" font-size="58" font-weight="800"
        letter-spacing="16" fill="#F4EDE3" stroke="#0E1828" stroke-width="1">TORDEN</text>
  <text x="450" y="150" text-anchor="middle" font-size="15" letter-spacing="6" fill="#9FB3CB">FAMILY MAKER LAB</text>

  <!-- workbench -->
  <rect x="0" y="190" width="900" height="40" fill="#C9B393"/>
  <rect x="0" y="190" width="900" height="7" fill="#B39D7D"/>

  <!-- robot family silhouettes on the bench -->
  <!-- quadruped -->
  <g transform="translate(96,146)" fill="#8B5E3C" stroke="#6E4629" stroke-width="2">
    <rect x="0" y="10" width="58" height="24" rx="5"/>
    <line x1="10" y1="34" x2="4"  y2="48" stroke="#9AA3AB" stroke-width="4"/>
    <line x1="22" y1="34" x2="18" y2="48" stroke="#9AA3AB" stroke-width="4"/>
    <line x1="38" y1="34" x2="42" y2="48" stroke="#9AA3AB" stroke-width="4"/>
    <line x1="50" y1="34" x2="56" y2="48" stroke="#9AA3AB" stroke-width="4"/>
    <circle cx="50" cy="16" r="6" fill="#D7DBDE" stroke="#8F979E"/>
  </g>
  <!-- block bot with washer eyes -->
  <g transform="translate(236,132)">
    <rect x="0" y="0" width="44" height="58" rx="7" fill="#B08968" stroke="#8B6547" stroke-width="2"/>
    <circle cx="15" cy="20" r="9" fill="#D7DBDE" stroke="#8F979E" stroke-width="2"/>
    <circle cx="33" cy="20" r="7" fill="#D7DBDE" stroke="#8F979E" stroke-width="2"/>
    <path d="M12 42 q10 6 22 1" stroke="#54371F" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="18" y="-10" width="4" height="10" fill="#9AA3AB"/>
  </g>
  <!-- device with face (LYN) -->
  <g transform="translate(600,138)">
    <rect x="0" y="0" width="52" height="52" rx="9" fill="#2E4A6B" stroke="#22374F" stroke-width="2"/>
    <rect x="7" y="7" width="38" height="26" rx="4" fill="#0E1828"/>
    <circle cx="18" cy="18" r="3.5" fill="#E2B93B"/>
    <circle cx="34" cy="18" r="3.5" fill="#E2B93B"/>
    <path d="M17 26 q9 5 18 0" stroke="#E2B93B" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <circle cx="26" cy="43" r="6" fill="#E2B93B" stroke="#C9A227" stroke-width="2"/>
  </g>
  <!-- bird -->
  <g transform="translate(742,128)">
    <rect x="0" y="0" width="26" height="56" rx="5" fill="#2E4A6B" stroke="#22374F" stroke-width="2" transform="rotate(-7 13 28)"/>
    <circle cx="13" cy="16" r="9" fill="#E2B93B" stroke="#B99022" stroke-width="2"/>
    <circle cx="13" cy="16" r="4" fill="#1B222B"/>
    <path d="M22 12 L40 17 L22 22 Z" fill="#D98E2B"/>
    <line x1="8"  y1="56" x2="5"  y2="66" stroke="#7E8790" stroke-width="3" stroke-linecap="round"/>
    <line x1="18" y1="56" x2="21" y2="66" stroke="#7E8790" stroke-width="3" stroke-linecap="round"/>
  </g>

  <text x="450" y="182" text-anchor="middle" font-size="13" fill="#7E93AE" letter-spacing="2">3D PRINTING · MICROELECTRONICS · ROBOTS · BUILT BY A DAD AND HIS KIDS</text>
</svg>
